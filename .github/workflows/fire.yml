# Issue Fire - fires queued issues twice daily
name: Issue Fire

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-manager
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r issue-manager/requirements.txt

      - name: Authenticate gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fire issues
        run: python issue-manager/fire.py --count 2

      - name: Commit updated queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for FILE in issue-manager/queue.yml issue-manager/ammunition.yml; do
            if [ -f "$FILE" ]; then
              FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/${FILE}?ref=issue-manager" --jq '.sha' 2>/dev/null || echo "")
              if [ -n "$FILE_SHA" ]; then
                CONTENT=$(base64 -w0 "$FILE")
                gh api "repos/${{ github.repository }}/contents/${FILE}" \
                  --method PUT \
                  -f message="chore: update queue after daily fire" \
                  -f content="$CONTENT" \
                  -f sha="$FILE_SHA" \
                  -f branch="issue-manager"
              fi
            fi
          done
