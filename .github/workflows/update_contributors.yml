name: Update Contributors

on:
  pull_request:
    types: [closed]

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update README via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          AUTHOR=${{ github.event.pull_request.user.login }}

          # Extract tool name from PR title
          TOOL=$(echo "${{ github.event.pull_request.title }}" | grep -oP '\[tool\]\s*\K\S+' || echo "")

          if [ -z "$TOOL" ]; then
            TOOL=$(gh pr diff $PR_NUM --repo $REPO | grep -oP '^\+\+\+ b/tools/\K[^.]+' | head -1 || echo "")
          fi

          if [ -z "$AUTHOR" ]; then
            echo "No author found, skipping"
            exit 0
          fi

          # Get current README
          README_SHA=$(gh api repos/$REPO/contents/README.md --jq '.sha')
          README_CONTENT=$(gh api repos/$REPO/contents/README.md --jq '.content' | base64 -d)

          # Update README
          if echo "$README_CONTENT" | grep -q "\[@$AUTHOR\]"; then
            if [ -n "$TOOL" ] && ! echo "$README_CONTENT" | grep -q "$TOOL"; then
              NEW_CONTENT=$(echo "$README_CONTENT" | sed "/\[@$AUTHOR\]/ s/ *|$/ $TOOL |/")
            else
              echo "Already up to date"
              exit 0
            fi
          else
            if [ -n "$TOOL" ]; then
              NEW_ROW="| [@${AUTHOR}](https://github.com/${AUTHOR}) | ${TOOL} |"
            else
              NEW_ROW="| [@${AUTHOR}](https://github.com/${AUTHOR}) | contributor |"
            fi
            NEW_CONTENT=$(echo "$README_CONTENT" | sed "/^<!-- Contributors/i\\$NEW_ROW")
          fi

          # Check if changed
          if [ "$README_CONTENT" = "$NEW_CONTENT" ]; then
            echo "No changes needed"
            exit 0
          fi

          # Commit directly to main via API
          ENCODED=$(echo "$NEW_CONTENT" | base64 -w 0)
          gh api repos/$REPO/contents/README.md -X PUT \
            -f message="docs: add @$AUTHOR to contributors" \
            -f content="$ENCODED" \
            -f sha="$README_SHA" \
            -f branch="main"

          echo "Updated README with @$AUTHOR ($TOOL)"
